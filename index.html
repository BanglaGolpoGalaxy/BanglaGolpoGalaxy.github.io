<style>

html { scroll-behavior: smooth; }

body {
  margin:0;
  font-family: Arial;
  background:#020617;
  color:white;
}

header {
  text-align:center;
  padding:20px;
}

header h1 { color:#38bdf8; }

.section {
  padding:10px;
}

.scroll {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

/* 🔥 SMALL CARD */
.card {
  min-width:160px;
  max-width:160px;
  background:#0f172a;
  border-radius:10px;
  flex-shrink:0;
  text-align:center;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

.card h3 {
  font-size:14px;
  padding:5px;
}

.btn {
  display:inline-block;
  margin:5px;
  padding:6px;
  font-size:12px;
  background:#2563eb;
  color:white;
  text-decoration:none;
  border-radius:6px;
}

footer {
  text-align:center;
  padding:20px;
  font-size:14px;
  opacity:0.7;
}

</style>

</head>

<body>

<header>
<h1>🌌 Bangla Golpo Galaxy</h1>
<p>বাংলা গল্পের এক নতুন জগৎ</p>
</header>

<!-- 🆕 LATEST -->
<div class="section">
<h2>🆕 Latest Stories</h2>
<div class="scroll" id="latest"></div>
</div>

<!-- ⭐ FEATURED -->
<div class="section">
<h2>⭐ Featured Story</h2>
<div class="scroll" id="featured"></div>
</div>

<!-- 🚀 SCI -->
<div class="section">
<h2>🚀 Sci-Fi</h2>
<div class="scroll" id="sci"></div>
</div>

<!-- 🌐 ALL -->
<div class="section">
<h2>🌐 All Stories</h2>
<div class="scroll" id="all"></div>
</div>

<footer>

<div>

style="background:#38bdf8; padding:10px; border-radius:6px; color:black;">

</footer>

<script>

const stories = [
{
  title:"অদৃশ্য জগতের দ্বার",
  image:"IMG_20260323_124840.jpg",
  link:"part1.html",
  category:"sci",
  featured:true
}
];

function card(s){
return `
<div class="card">
<img src="${s.image}">
<h3>${s.title}</h3>
<a href="${s.link}" class="btn">পড়ুন</a>
</div>`;
}

stories.forEach(s=>{
latest.innerHTML+=card(s);
all.innerHTML+=card(s);
if(s.featured) featured.innerHTML+=card(s);
if(s.category==="sci") sci.innerHTML+=card(s);
});

</script>
