<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bangla Golpo Galaxy</title>

<style>
  <script>

function filterStory(category) {
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    if (category === "all") {
      card.style.display = "block";
    } else {
      if (card.getAttribute("data-category") === category) {
        card.style.display = "block";
      } else {
        card.style.display = "none";
      }
    }
  });
}

</script>

/* BODY */
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #010314, #021024);
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 30px 10px;
}

header h1 {
  font-size: 26px;
  color: cyan;
}

header p {
  opacity: 0.7;
}

/* CATEGORY BUTTONS */
.categories {
  text-align: center;
  margin: 20px 0;
}

.categories button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 20px;
  background: #0f172a;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.categories button:hover {
  background: cyan;
  color: black;
}

/* STORY GRID */
.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: #0b1120;
  border-radius: 12px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
}

/* IMAGE */
.card img {
  width: 100%;
}

/* TEXT */
.card h3 {
  margin: 10px;
}

.card a {
  text-decoration: none;
  color: white;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin: 10px;
  padding: 8px 12px;
  background: cyan;
  color: black;
  border-radius: 6px;
}
.categories button:active {
  background: cyan;
  color: black;
    }
/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.5;
}

</style>

</head>

<body>

<header>
  <h1>🌌 Bangla Golpo Galaxy</h1>
  <p>বাংলা গল্পের এক নতুন জগৎ</p>
</header>

<div class="categories">
  <button onclick="filterStory('all')">🌐 All</button>
  <button onclick="filterStory('sci')">🚀 Sci-Fi</button>
  <button onclick="filterStory('romantic')">❤️ Romantic</button>
  <button onclick="filterStory('sad')">💔 বিরহ</button>
</div>

<div class="container">

  <!-- STORY 1 -->
  <div class="card" data-category="sci">
  <img src="IMG_20260323_124840.jpg">
  <h3>অজানা জগতের দ্বার</h3>
  <a href="part1.html" class="btn">পড়ুন</a>
</div>

</div>

<footer>
  © 2026 Bangla Golpo Galaxy
</footer>

</body>
</html>
<h1>Welcome to My Story World 🌌</h1>

<p>এখানে আপনি আমার লেখা বিভিন্ন গল্প পড়তে পারবেন</p>

<div class="story-box">

    <h2>📖 গল্পের তালিকা</h2>

    <a href="part1.html">অদৃশ্য জগতের দ্বার</a>

</div>

</body>
</html>
