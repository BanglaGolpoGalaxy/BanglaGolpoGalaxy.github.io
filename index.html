<style>
html {scroll-behavior:smooth;}

body {
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

header {text-align:center;padding:20px;}
header h1 {color:#38bdf8;}

.section {padding:10px;}

.scroll {
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

/* 🔥 CARD */
.card {
min-width:160px;
max-width:160px;
background:#0f172a;
border-radius:10px;
flex-shrink:0;
text-align:center;
transition:0.3s;
}

.card:hover {
transform:scale(1.05);
}

.card img {
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.card h3 {
font-size:14px;
padding:5px;
}

.btn {
display:inline-block;
margin:5px;
padding:6px;
font-size:12px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:6px;
}

footer {
text-align:center;
padding:20px;
font-size:14px;
opacity:0.85;
}
</style>

</head>

<body>

<header>

  <img src="BGGlogo.jpg" alt="Bangla Golpo Galaxy Logo"
  style="width:120px; margin-bottom:10px;">

  <h1>🌌 Bangla Golpo Galaxy</h1>
  <p>বাংলা গল্পের এক নতুন জগৎ</p>

</header>

<!-- 🆕 LATEST -->
<div class="section">
<h2>🆕 Latest Stories</h2>
<div class="scroll" id="latest"></div>
</div>

<!-- ⭐ FEATURED -->
<div class="section">
<h2>⭐ Featured Story</h2>
<div class="scroll" id="featured"></div>
</div>

<!-- 🚀 SCI -->
<div class="section">
<h2>🚀 Sci-Fi</h2>
<div class="scroll" id="sci"></div>
</div>

<!-- 🌐 ALL -->
<div class="section">
<h2>🌐 All Stories</h2>
<div class="scroll" id="all"></div>
</div>

<footer>

<div>
<a href="https://forms.gle/fXZ28mAu7d5E2xuC8" target="_blank"
style="background:#38bdf8; padding:10px; border-radius:6px; color:black;">
📝 নিজের গল্প জমা দিন
</a>

<p>⚠️ গল্পের দায় সম্পূর্ণ লেখকের নিজের</p>
</div>

<!-- 📩 CONTACT FORM -->
<div style="margin-top:40px;">

<h3>📩 অভিযোগ / মতামত পাঠান</h3>

<form id="contactForm" action="https://formspree.io/f/mpqowyld" method="POST">

<input type="text" name="name" placeholder="আপনার নাম" required
style="width:100%; padding:10px; margin:6px 0; border-radius:6px;">

<input type="email" name="email" placeholder="আপনার ইমেইল (optional)"
style="width:100%; padding:10px; margin:6px 0; border-radius:6px;">

<textarea name="message" placeholder="আপনার বার্তা লিখুন..." required
style="width:100%; padding:10px; margin:6px 0; border-radius:6px; height:110px;"></textarea>

<button type="submit"
style="width:100%; padding:10px; background:#007BFF; color:white; border:none; border-radius:6px;">
📤 পাঠান
</button>

</form>

</div>

<!-- ✅ POPUP -->
<div id="popup" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
z-index:999;
">
<p>✅ ধন্যবাদ! আপনার বার্তা সফলভাবে পাঠানো হয়েছে!</p>
<button onclick="closePopup()">OK</button>
</div>

<p style="margin-top:20px;">© 2026 Bangla Golpo Galaxy</p>

</footer>

<script>

// 🌙 AUTO DARK MODE
if(window.matchMedia('(prefers-color-scheme: dark)').matches){
document.body.classList.add("dark-mode");
}

// 📚 STORIES
const stories = [
{
title:"অদৃশ্য জগতের দ্বার",
image:"IMG_20260323_124840.jpg",
link:"part1.html",
category:"sci",
featured:true
}
];

// 🎴 CARD
function card(s){
return `
<div class="card">
<img src="${s.image}" loading="lazy">
<h3>${s.title}</h3>
<a href="${s.link}" class="btn">পড়ুন</a>
</div>`;
}

// LOAD STORIES
stories.forEach(s=>{
latest.innerHTML+=card(s);
all.innerHTML+=card(s);
if(s.featured) featured.innerHTML+=card(s);
if(s.category==="sci") sci.innerHTML+=card(s);
});

// 📩 FORM SUBMIT
const form=document.getElementById("contactForm");

form.addEventListener("submit", async function(e){
e.preventDefault();

const data=new FormData(form);

await fetch(form.action,{
method:"POST",
body:data,
headers:{'Accept':'application/json'}
});

form.reset();
document.getElementById("popup").style.display="block";
});

// CLOSE POPUP
function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
