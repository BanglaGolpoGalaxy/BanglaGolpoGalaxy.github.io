<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bangla Golpo Galaxy</title>

<style>

/* BODY */
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #020617, #020c1b);
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 30px 10px;
}

header h1 {
  font-size: 26px;
  color: #38bdf8;
}

header p {
  opacity: 0.7;
}

/* BUTTONS */
.categories {
  text-align: center;
  margin: 20px 0;
}

.categories button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 20px;
  background: #0f172a;
  color: white;
  cursor: pointer;
}

.categories button:hover {
  background: #38bdf8;
  color: black;
}

/* CARDS */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.card {
  width: 260px;
  background: #020617;
  border-radius: 12px;
  overflow: hidden;
  text-align: center;
}

.card img {
  width: 100%;
  height: auto;
}

.card h3 {
  margin: 10px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin: 10px;
  padding: 8px 12px;
  background: #2563eb;
  color: white;
  border-radius: 6px;
  text-decoration: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}

</style>
</head>

<body>

<header>
  <h1>🌌 Bangla Golpo Galaxy</h1>
  <p>বাংলা গল্পের এক নতুন জগৎ</p>
</header>

<div class="categories">
  <button onclick="filterStory('all')">🌐 All</button>
  <button onclick="filterStory('sci')">🚀 Sci-Fi</button>
</div>

<div class="container">

  <div class="card" data-category="sci">
    <img src="IMG_20260323_124840.jpg">
    <h3>অজানা জগতের দ্বার</h3>
    <a href="part1.html" class="btn">পড়ুন</a>
  </div>

</div>

<footer>
  © 2026 Bangla Golpo Galaxy
</footer>

<script>
function filterStory(category) {
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    if (category === "all") {
      card.style.display = "block";
    } else {
      if (card.getAttribute("data-category") === category) {
        card.style.display = "block";
      } else {
        card.style.display = "none";
      }
    }
  });
}
</script>

</body>
</html>
